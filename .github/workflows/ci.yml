name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run security regressions
        run: npm run test:security

      - name: Run frontend regressions
        run: npm run test:frontend-regressions

      - name: Run updater regressions
        run: |
          EXPECTED_RELEASE_VERSION="$(node -p "require('./package.json').version")" npm run test:updater

      - name: Run release workflow regressions
        run: npm run test:release-workflow

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
