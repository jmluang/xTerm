name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and finalize, for example v0.3.2"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag != 'v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Derive release version from tag
        run: |
          RELEASE_TAG="${{ github.event.inputs.tag }}"
          if [[ -z "${RELEASE_TAG}" && "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3: ${RELEASE_TAG}" >&2
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release version: ${RELEASE_VERSION}"

      - name: Inspect current release state and target assets
        id: inspect_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              RELEASE_ARCH="aarch64"
              ;;
            x86_64-apple-darwin)
              RELEASE_ARCH="x64"
              ;;
            *)
              echo "Unsupported release target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          echo "release_arch=${RELEASE_ARCH}" >> "$GITHUB_OUTPUT"
          echo "assets_complete=false" >> "$GITHUB_OUTPUT"
          echo "release_draft=true" >> "$GITHUB_OUTPUT"

          REQUIRED_ASSETS=(
            "xTermius_${RELEASE_VERSION}_${RELEASE_ARCH}.dmg"
            "xTermius_${RELEASE_ARCH}.app.tar.gz"
            "xTermius_${RELEASE_ARCH}.app.tar.gz.sig"
          )

          ERROR_LOG="$(mktemp)"
          if RELEASE_IS_DRAFT="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft' 2>"${ERROR_LOG}")"; then
            if [[ "${RELEASE_IS_DRAFT}" == "true" ]]; then
              echo "state=draft" >> "$GITHUB_OUTPUT"
              echo "release_draft=true" >> "$GITHUB_OUTPUT"
              echo "Release state: draft"
            else
              echo "state=published" >> "$GITHUB_OUTPUT"
              echo "release_draft=false" >> "$GITHUB_OUTPUT"
              echo "Release state: published"
            fi

            ASSETS="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
            MISSING_ASSETS=()
            for ASSET in "${REQUIRED_ASSETS[@]}"; do
              if ! grep -Fxq "${ASSET}" <<<"${ASSETS}"; then
                MISSING_ASSETS+=("${ASSET}")
              fi
            done

            if [[ "${#MISSING_ASSETS[@]}" -eq 0 ]]; then
              echo "assets_complete=true" >> "$GITHUB_OUTPUT"
              echo "Target assets for ${RELEASE_ARCH} already exist."
            else
              echo "Target assets missing for ${RELEASE_ARCH}: ${MISSING_ASSETS[*]}"
            fi
          else
            if grep -qiE '404|not found|release not found' "${ERROR_LOG}"; then
              echo "state=missing" >> "$GITHUB_OUTPUT"
              echo "release_draft=true" >> "$GITHUB_OUTPUT"
              echo "Release state: missing"
            else
              cat "${ERROR_LOG}" >&2
              exit 1
            fi
          fi

      - name: Checkout
        if: steps.inspect_release.outputs.assets_complete != 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release commit
        if: steps.inspect_release.outputs.assets_complete != 'true'
        run: |
          RELEASE_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}")"
          if [[ -z "${RELEASE_COMMIT}" ]]; then
            echo "Failed to resolve release commit for ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "RELEASE_COMMIT=${RELEASE_COMMIT}" >> "$GITHUB_ENV"
          echo "Release commit: ${RELEASE_COMMIT}"

      - name: Ensure draft release exists
        if: steps.inspect_release.outputs.assets_complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --verify-tag \
            --title "xTermius ${RELEASE_TAG}" \
            --notes "Automated release for ${RELEASE_TAG}."

      - name: Setup Node.js
        if: steps.inspect_release.outputs.assets_complete != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Sync app versions from tag
        if: steps.inspect_release.outputs.assets_complete != 'true'
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          function writeJson(filePath, update) {
            const json = JSON.parse(fs.readFileSync(filePath, "utf8"));
            update(json);
            fs.writeFileSync(filePath, `${JSON.stringify(json, null, 2)}\n`);
          }

          writeJson("package.json", (json) => {
            json.version = version;
          });

          writeJson("package-lock.json", (json) => {
            json.version = version;
            if (json.packages?.[""]) {
              json.packages[""].version = version;
            }
          });

          writeJson("src-tauri/tauri.conf.json", (json) => {
            json.version = version;
          });

          const cargoTomlPath = "src-tauri/Cargo.toml";
          const cargoToml = fs.readFileSync(cargoTomlPath, "utf8").replace(
            /(^version\s*=\s*")[^"]+("\s*$)/m,
            `$1${version}$2`
          );
          fs.writeFileSync(cargoTomlPath, cargoToml);

          const cargoLockPath = "src-tauri/Cargo.lock";
          const cargoLock = fs.readFileSync(cargoLockPath, "utf8").replace(
            /(\[\[package\]\]\s+name = "xtermius"\s+version = ")[^"]+(")/,
            `$1${version}$2`
          );
          fs.writeFileSync(cargoLockPath, cargoLock);
          NODE
          echo "Version files synchronized to ${RELEASE_VERSION}"

      - name: Setup Rust
        if: steps.inspect_release.outputs.assets_complete != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        if: steps.inspect_release.outputs.assets_complete != 'true'
        run: npm ci

      - name: Run release regression tests
        if: steps.inspect_release.outputs.assets_complete != 'true'
        run: |
          npm run test:security
          npm run test:frontend-regressions
          EXPECTED_RELEASE_VERSION="${RELEASE_VERSION}" npm run test:updater
          EXPECTED_RELEASE_VERSION="${RELEASE_VERSION}" npm run test:release-workflow

      - name: Build and publish Tauri release
        if: steps.inspect_release.outputs.assets_complete != 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "xTermius ${{ env.RELEASE_TAG }}"
          releaseDraft: ${{ steps.inspect_release.outputs.release_draft }}
          prerelease: false
          generateReleaseNotes: true
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true

  finalize_release:
    needs: build
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag != 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Derive release version from tag
        run: |
          RELEASE_TAG="${{ github.event.inputs.tag }}"
          if [[ -z "${RELEASE_TAG}" && "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3: ${RELEASE_TAG}" >&2
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release version: ${RELEASE_VERSION}"

      - name: Inspect current release state
        id: inspect_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERROR_LOG="$(mktemp)"
          if RELEASE_IS_DRAFT="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft' 2>"${ERROR_LOG}")"; then
            if [[ "${RELEASE_IS_DRAFT}" == "true" ]]; then
              echo "state=draft" >> "$GITHUB_OUTPUT"
              echo "Release state: draft"
            else
              echo "state=published" >> "$GITHUB_OUTPUT"
              echo "Release state: published"
            fi
          else
            if grep -qiE '404|not found|release not found' "${ERROR_LOG}"; then
              echo "state=missing" >> "$GITHUB_OUTPUT"
              echo "Release state: missing"
            else
              cat "${ERROR_LOG}" >&2
              exit 1
            fi
          fi

      - name: Fail if release is missing
        if: steps.inspect_release.outputs.state == 'missing'
        run: |
          echo "Release ${RELEASE_TAG} is missing, cannot finalize." >&2
          exit 1

      - name: Validate release assets and latest.json
        if: steps.inspect_release.outputs.state != 'missing'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQUIRED_ASSETS=(
            "latest.json"
            "xTermius_${RELEASE_VERSION}_aarch64.dmg"
            "xTermius_aarch64.app.tar.gz"
            "xTermius_aarch64.app.tar.gz.sig"
            "xTermius_${RELEASE_VERSION}_x64.dmg"
            "xTermius_x64.app.tar.gz"
            "xTermius_x64.app.tar.gz.sig"
          )

          ASSETS="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          MISSING_ASSETS=()
          for ASSET in "${REQUIRED_ASSETS[@]}"; do
            if ! grep -Fxq "${ASSET}" <<<"${ASSETS}"; then
              MISSING_ASSETS+=("${ASSET}")
            fi
          done

          if [[ "${#MISSING_ASSETS[@]}" -gt 0 ]]; then
            echo "Missing release assets: ${MISSING_ASSETS[*]}" >&2
            exit 1
          fi

          ASSET_DIR="${RUNNER_TEMP}/release-assets"
          mkdir -p "${ASSET_DIR}"
          gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir "${ASSET_DIR}" --clobber

          LATEST_JSON="${ASSET_DIR}/latest.json"
          LATEST_VERSION="$(jq -r '.version // empty' "${LATEST_JSON}")"
          if [[ "${LATEST_VERSION}" != "${RELEASE_VERSION}" ]]; then
            echo "latest.json version ${LATEST_VERSION} does not match ${RELEASE_VERSION}" >&2
            exit 1
          fi

          jq -e '.platforms and (.platforms | type == "object")' "${LATEST_JSON}" >/dev/null

          for PLATFORM in darwin-aarch64 darwin-aarch64-app darwin-x86_64 darwin-x86_64-app; do
            URL="$(jq -r --arg platform "${PLATFORM}" '.platforms[$platform].url // empty' "${LATEST_JSON}")"
            SIGNATURE="$(jq -r --arg platform "${PLATFORM}" '.platforms[$platform].signature // empty' "${LATEST_JSON}")"

            if [[ -z "${URL}" ]]; then
              echo "latest.json is missing URL for ${PLATFORM}" >&2
              exit 1
            fi

            if [[ "${URL}" != *"/releases/download/${RELEASE_TAG}/"* ]]; then
              echo "latest.json URL for ${PLATFORM} does not point at ${RELEASE_TAG}: ${URL}" >&2
              exit 1
            fi

            if [[ -z "${SIGNATURE}" ]]; then
              echo "latest.json is missing signature for ${PLATFORM}" >&2
              exit 1
            fi

            URL_BASENAME="$(basename "${URL}")"
            if ! grep -Fxq "${URL_BASENAME}" <<<"${ASSETS}"; then
              echo "latest.json URL asset for ${PLATFORM} is not attached to the release: ${URL_BASENAME}" >&2
              exit 1
            fi
          done

          echo "Release assets and latest.json validated."

      - name: Publish draft release
        if: steps.inspect_release.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false

      - name: Release already published
        if: steps.inspect_release.outputs.state == 'published'
        run: echo "Release ${RELEASE_TAG} is already published"
