name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare_release:
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name != 'v'
    runs-on: ubuntu-latest
    outputs:
      release_state: ${{ steps.inspect_release.outputs.state }}
    permissions:
      contents: read
    steps:
      - name: Inspect existing release state
        id: inspect_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if RELEASE_IS_DRAFT="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [[ "${RELEASE_IS_DRAFT}" == "true" ]]; then
              echo "state=draft" >> "$GITHUB_OUTPUT"
              echo "Release state: draft"
            else
              echo "state=published" >> "$GITHUB_OUTPUT"
              echo "Release state: published"
            fi
          else
            echo "state=missing" >> "$GITHUB_OUTPUT"
            echo "Release state: missing"
          fi

  build:
    needs: prepare_release
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name != 'v' && needs.prepare_release.outputs.release_state != 'published'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Derive release version from tag
        run: |
          echo "RELEASE_TAG=" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=" >> "$GITHUB_ENV"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            if [[ -n "${VERSION}" ]]; then
              echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
              echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"
              echo "Release tag: ${TAG}"
              echo "Release version: ${VERSION}"
            else
              echo "Ignoring invalid release tag: ${TAG}"
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Sync app versions from tag
        if: env.RELEASE_VERSION != ''
        run: |
          node -e "const fs=require('fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=process.env.RELEASE_VERSION; fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\n');"
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=process.env.RELEASE_VERSION; fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\n');"
          node -e 'const fs=require("fs"); const p="src-tauri/Cargo.toml"; let s=fs.readFileSync(p,"utf8"); s=s.replace(/(^version\\s*=\\s*")[^"]+("\\s*$)/m, "$1"+process.env.RELEASE_VERSION+"$2"); fs.writeFileSync(p, s);'
          echo "Version files synchronized to ${RELEASE_VERSION}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Build and publish Tauri release
        if: env.RELEASE_TAG != ''
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "xTermius ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          tauriScript: npm run tauri --
          args: --target ${{ matrix.target }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

  finalize_release:
    needs:
      - prepare_release
      - build
    if: startsWith(github.ref, 'refs/tags/') && github.ref_name != 'v' && needs.prepare_release.outputs.release_state != 'published' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
